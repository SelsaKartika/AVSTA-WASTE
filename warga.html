<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVSA Waste - Beranda</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        :root {
            --green: #16A34A;
            --green-dark: #15803d;
            --green-soft: #DCFCE7;
            --navy: #1e3a5f;
            --orange: #F97316;
            --blue: #3B82F6;
            --gray: #6B7280;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
            --nav-h: 60px;
        }

        html { font-size: 16px; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #F0FDF4;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
        }

        .app {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            min-height: 100dvh;
            background: #F0FDF4;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #16A34A, #15803d);
            padding: 14px 20px 18px;
            padding-top: calc(14px + env(safe-area-inset-top));
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(22,163,74,0.3);
        }

        .header-row { display:flex; justify-content:space-between; align-items:center; }

        .header-sub { font-size:11px; color:rgba(255,255,255,0.7); font-weight:600; letter-spacing:1px; text-transform:uppercase; }
        .header-name-big { font-size:clamp(18px,5vw,22px); font-weight:800; color:white; margin-top:2px; }
        .header-name-small { font-size:13px; color:rgba(255,255,255,0.8); font-weight:500; margin-top:1px; }

        .notif-btn {
            width:40px; height:40px; border-radius:50%;
            background:rgba(255,255,255,0.2); border:none; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            position:relative; flex-shrink:0; transition:background .2s;
        }
        .notif-btn:active { background:rgba(255,255,255,0.35); }
        .notif-dot {
            position:absolute; top:8px; right:8px;
            width:8px; height:8px; background:#FCD34D;
            border-radius:50%; border:2px solid #16A34A;
        }

        /* SCROLL CONTENT */
        .scroll {
            flex:1;
            padding: 14px 14px calc(var(--nav-h) + 80px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* MAP */
        .map-card {
            border-radius:16px;
            overflow:hidden;
            box-shadow: var(--shadow-md);
            background: white;
        }

        .map-bar {
            display:flex; justify-content:space-between; align-items:center;
            padding:10px 14px;
            border-bottom:1px solid #F3F4F6;
        }

        .map-bar-label {
            font-size:13px; font-weight:700; color:var(--navy);
            display:flex; align-items:center; gap:5px;
        }

        .map-open-btn {
            background:var(--green); color:white; border:none;
            border-radius:20px; padding:6px 13px;
            font-size:12px; font-weight:700;
            font-family:'Plus Jakarta Sans',sans-serif;
            cursor:pointer; display:flex; align-items:center; gap:4px;
            box-shadow:0 2px 8px rgba(22,163,74,.35);
            transition:all .2s;
        }
        .map-open-btn:active { background:var(--green-dark); transform:scale(.97); }

        .map-loading {
            height: clamp(160px, 30vw, 210px);
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            background:#f0fdf4; gap:10px;
        }

        .dots { display:flex; gap:6px; }
        .dot {
            width:9px; height:9px;
            background:var(--green); border-radius:50%;
            animation: blink 1.1s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay:.2s; }
        .dot:nth-child(3) { animation-delay:.4s; }
        @keyframes blink {
            0%,100% { transform:scale(.6); opacity:.3; }
            50% { transform:scale(1); opacity:1; }
        }

        .load-txt { font-size:12px; color:var(--gray); font-weight:500; }

        #the-map {
            width:100%;
            height: clamp(160px, 30vw, 210px);
            display:none;
        }

        /* Leaflet tweak */
        .leaflet-container { font-family:'Plus Jakarta Sans',sans-serif; }
        .leaflet-popup-content-wrapper { border-radius:10px !important; }
        .leaflet-popup-content { font-size:13px !important; font-weight:600 !important; color:var(--navy) !important; margin:10px 14px !important; }

        /* INFO CARDS */
        .info-grid {
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:10px;
            margin-top:14px;
        }

        .ic {
            border-radius:14px;
            padding:clamp(10px,3vw,15px) 8px;
            text-align:center;
            box-shadow:var(--shadow-sm);
            cursor:pointer;
            transition:transform .2s;
        }
        .ic:active { transform:scale(.94); }
        .ic-white { background:white; border:2px solid #E5E7EB; }
        .ic-orange { background:var(--orange); }
        .ic-blue { background:var(--blue); }

        .ic-emoji { font-size:clamp(15px,4vw,19px); margin-bottom:4px; }
        .ic-num { font-size:clamp(22px,6vw,30px); font-weight:800; line-height:1; }
        .ic-white .ic-num { color:var(--navy); }
        .ic-orange .ic-num, .ic-blue .ic-num { color:white; }
        .ic-lbl { font-size:clamp(9px,2.5vw,11px); font-weight:600; margin-top:4px; line-height:1.3; }
        .ic-white .ic-lbl { color:var(--gray); }
        .ic-orange .ic-lbl, .ic-blue .ic-lbl { color:rgba(255,255,255,.9); }

        /* LAPORAN */
        .sec-header {
            display:flex; justify-content:space-between; align-items:center;
            margin: 20px 0 10px;
        }
        .sec-title { font-size:clamp(14px,4vw,16px); font-weight:800; color:var(--navy); }
        .sec-link {
            font-size:12px; font-weight:700; color:var(--green);
            background:none; border:none; font-family:'Plus Jakarta Sans',sans-serif; cursor:pointer;
        }

        .lap-list { display:flex; flex-direction:column; gap:10px; }

        .lap-card {
            background:white; border-radius:14px; padding:13px 14px;
            box-shadow:var(--shadow-sm); display:flex; align-items:flex-start;
            gap:12px; cursor:pointer; transition:transform .2s;
            animation: up .4s ease both;
        }
        @keyframes up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .lap-card:active { transform:scale(.98); }

        .lap-icon {
            width:40px; height:40px; border-radius:11px;
            background:var(--green-soft); display:flex;
            align-items:center; justify-content:center;
            font-size:18px; flex-shrink:0;
        }

        .lap-body { flex:1; min-width:0; }
        .lap-top { display:flex; justify-content:space-between; align-items:flex-start; gap:6px; }
        .lap-title { font-size:clamp(13px,3.5vw,14px); font-weight:700; color:var(--navy); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .badge { font-size:10px; font-weight:700; padding:3px 8px; border-radius:20px; white-space:nowrap; flex-shrink:0; }
        .b-proses { background:#DBEAFE; color:#1D4ED8; }
        .b-selesai { background:#DCFCE7; color:#15803D; }
        .b-tunggu { background:#FEF3C7; color:#B45309; }
        .b-darurat { background:#FEE2E2; color:#DC2626; }
        .lap-meta { font-size:11px; color:var(--gray); margin-top:3px; font-weight:500; }

        .empty {
            text-align:center; padding:28px 20px;
            background:white; border-radius:14px;
            color:var(--gray);
        }
        .empty-ico { font-size:34px; margin-bottom:8px; }
        .empty-txt { font-size:13px; font-weight:500; }

        /* FAB */
        .fab-wrap {
            position:fixed;
            bottom:var(--nav-h);
            left:50%; transform:translateX(-50%);
            width:100%; max-width:480px;
            padding:10px 14px;
            background:linear-gradient(to top, #F0FDF4 55%, transparent);
            z-index:50;
        }
        .fab {
            width:100%; padding:15px;
            background:linear-gradient(135deg,#16A34A,#15803d);
            color:white; border:none; border-radius:14px;
            font-size:clamp(14px,4vw,15px); font-weight:700;
            font-family:'Plus Jakarta Sans',sans-serif;
            cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
            box-shadow:0 6px 20px rgba(22,163,74,.45);
            transition:all .2s;
        }
        .fab:active { transform:scale(.98); }

        /* BOTTOM NAV */
        .bnav {
            position:fixed; bottom:0; left:50%; transform:translateX(-50%);
            width:100%; max-width:480px; height:var(--nav-h);
            background:white; border-top:1px solid #E5E7EB;
            display:flex; z-index:100;
            box-shadow:0 -4px 12px rgba(0,0,0,.06);
            padding-bottom:env(safe-area-inset-bottom);
        }
        .ni {
            flex:1; display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            padding:8px 0; cursor:pointer;
            text-decoration:none; border:none; background:none;
            font-family:'Plus Jakarta Sans',sans-serif; gap:2px;
            transition:opacity .2s;
        }
        .ni:active { opacity:.7; }
        .ni-ico { font-size:20px; line-height:1; }
        .ni-lbl { font-size:10px; font-weight:600; }
        .ni.active .ni-lbl { color:var(--green); }
        .ni:not(.active) .ni-lbl { color:#9CA3AF; }

        /* MODAL */
        .overlay {
            position:fixed; inset:0;
            background:rgba(0,0,0,.5);
            z-index:200; display:flex;
            align-items:flex-end; justify-content:center;
            opacity:0; pointer-events:none;
            transition:opacity .3s;
            backdrop-filter:blur(2px);
            -webkit-backdrop-filter:blur(2px);
        }
        .overlay.on { opacity:1; pointer-events:all; }

        .sheet {
            width:100%; max-width:480px;
            background:white; border-radius:24px 24px 0 0;
            padding:20px 20px calc(32px + env(safe-area-inset-bottom));
            transform:translateY(100%);
            transition:transform .35s cubic-bezier(.32,.72,0,1);
            max-height:92vh; overflow-y:auto;
        }
        .overlay.on .sheet { transform:translateY(0); }

        .handle { width:38px; height:4px; background:#E5E7EB; border-radius:2px; margin:0 auto 16px; }
        .modal-ttl { font-size:17px; font-weight:800; color:var(--navy); margin-bottom:16px; }

        .fg { margin-bottom:13px; }
        .fl { font-size:13px; font-weight:600; color:var(--navy); margin-bottom:5px; display:block; }
        .fi, .fsel, .fta {
            width:100%; padding:12px 13px;
            border:2px solid #E5E7EB; border-radius:10px;
            font-size:14px; font-family:'Plus Jakarta Sans',sans-serif;
            color:var(--navy); background:white; outline:none;
            transition:border-color .2s;
            -webkit-appearance:none; appearance:none;
        }
        .fi:focus,.fsel:focus,.fta:focus { border-color:var(--green); }
        .fta { resize:none; height:76px; }

        .fsub {
            width:100%; padding:14px;
            background:linear-gradient(135deg,#16A34A,#15803d);
            color:white; border:none; border-radius:12px;
            font-size:15px; font-weight:700;
            font-family:'Plus Jakarta Sans',sans-serif;
            cursor:pointer; margin-top:6px; transition:all .2s;
        }
        .fsub:active { transform:scale(.98); }

        /* TOAST */
        .toast {
            position:fixed; bottom:140px; left:50%;
            transform:translateX(-50%) translateY(10px);
            background:#1e3a5f; color:white;
            padding:11px 20px; border-radius:30px;
            font-size:13px; font-weight:600;
            z-index:999; white-space:nowrap;
            box-shadow:0 4px 16px rgba(0,0,0,.2);
            font-family:'Plus Jakarta Sans',sans-serif;
            opacity:0; transition:opacity .3s, transform .3s;
            pointer-events:none;
        }
        .toast.on { opacity:1; transform:translateX(-50%) translateY(0); }

        @media(min-width:768px) {
            #the-map { height:260px; }
            .map-loading { height:260px; }
        }
        @media(max-height:580px) {
            #the-map { height:140px; }
            .map-loading { height:140px; }
        }
    </style>
</head>
<body>
<div class="app">

    <!-- HEADER -->
    <div class="header">
        <div class="header-row">
            <div>
                <div class="header-sub">Beranda</div>
                <div class="header-name-big">Selamat Datang,</div>
                <div class="header-name-small">Selsa Aida Avryzel</div>
            </div>
            <button class="notif-btn" id="notif-btn">
                <svg width="20" height="20" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <div class="notif-dot"></div>
            </button>
        </div>
    </div>

    <!-- SCROLL AREA -->
    <div class="scroll">

        <!-- MAP -->
        <div class="map-card">
            <div class="map-bar">
                <div class="map-bar-label">📍 Peta TPS Terdekat</div>
                <button class="map-open-btn" onclick="bukaGMaps()">
                    <svg width="11" height="11" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                        <polyline points="15 3 21 3 21 9"/>
                        <line x1="10" y1="14" x2="21" y2="3"/>
                    </svg>
                    Buka Maps
                </button>
            </div>
            <div class="map-loading" id="map-loading">
                <div class="dots">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
                <div class="load-txt">Memuat peta...</div>
            </div>
            <div id="the-map"></div>
        </div>

        <!-- INFO CARDS -->
        <div class="info-grid">
            <div class="ic ic-white" onclick="showInfo('nearby')">
                <div class="ic-emoji">🗺️</div>
                <div class="ic-num" id="cnt-near">3</div>
                <div class="ic-lbl">TPS Terdekat</div>
            </div>
            <div class="ic ic-orange" onclick="showInfo('full')">
                <div class="ic-emoji">🗑️</div>
                <div class="ic-num" id="cnt-full">1</div>
                <div class="ic-lbl">TPS Penuh</div>
            </div>
            <div class="ic ic-blue" onclick="showInfo('proses')">
                <div class="ic-emoji">♻️</div>
                <div class="ic-num" id="cnt-proses">2</div>
                <div class="ic-lbl">Diproses</div>
            </div>
        </div>

        <!-- LAPORAN -->
        <div class="sec-header">
            <div class="sec-title">Laporan Terbaru</div>
            <button class="sec-link" onclick="toast('📋 Total '+laporans.length+' laporan')">Lihat Semua →</button>
        </div>
        <div class="lap-list" id="lap-list"></div>

    </div>

    <!-- FAB -->
    <div class="fab-wrap">
        <button class="fab" onclick="openModal()">
            <svg width="17" height="17" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Buat Laporan Baru
        </button>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bnav">
        <a href="index.html" class="ni">
            <div class="ni-ico">🏠</div>
            <div class="ni-lbl" style="color:#9CA3AF">Home</div>
        </a>
        <button class="ni active">
            <div class="ni-ico">📋</div>
            <div class="ni-lbl">Beranda</div>
        </button>
        <button class="ni" onclick="toast('ℹ️ Halaman info segera hadir')">
            <div class="ni-ico">ℹ️</div>
            <div class="ni-lbl" style="color:#9CA3AF">Info</div>
        </button>
        <button class="ni" onclick="toast('👤 Halaman profil segera hadir')">
            <div class="ni-ico">👤</div>
            <div class="ni-lbl" style="color:#9CA3AF">Profil</div>
        </button>
    </nav>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModalOut(event)">
    <div class="sheet" id="sheet">
        <div class="handle"></div>
        <div class="modal-ttl">📝 Buat Laporan Baru</div>

        <div class="fg">
            <label class="fl">Nama TPS / Lokasi</label>
            <input type="text" class="fi" id="f-lokasi" placeholder="Contoh: TPS Sawangan, Depok">
        </div>
        <div class="fg">
            <label class="fl">Alamat Lengkap</label>
            <input type="text" class="fi" id="f-alamat" placeholder="Contoh: Jl. Raya Sawangan No. 5">
        </div>
        <div class="fg">
            <label class="fl">Status Laporan</label>
            <select class="fsel" id="f-status">
                <option value="penuh">🗑️ Sampah Penuh</option>
                <option value="menunggu">⏳ Perlu Pengambilan</option>
                <option value="darurat">🚨 Darurat</option>
            </select>
        </div>
        <div class="fg">
            <label class="fl">Keterangan (opsional)</label>
            <textarea class="fta" id="f-ket" placeholder="Tambahkan keterangan..."></textarea>
        </div>
        <button class="fsub" onclick="kirim()">✅ Kirim Laporan</button>
    </div>
</div>

<div class="toast" id="toastEl"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ===== DATA =====
let laporans = [
    { id:1, lokasi:"TPS Sawangan", alamat:"Jl Pasir Putih, Sawangan Depok", waktu:"1 Jam yang lalu", status:"diproses" },
    { id:2, lokasi:"TPS Jakarta Selatan", alamat:"Jl Condet", waktu:"22 Menit yang lalu", status:"selesai" },
];

const tpsList = [
    { lat:-6.3806, lng:106.7637, nama:"TPS Sawangan", status:"penuh" },
    { lat:-6.2701, lng:106.8243, nama:"TPS Condet", status:"aktif" },
    { lat:-6.2615, lng:106.8106, nama:"TPS Jakarta Selatan", status:"diproses" },
];

let uLat = -6.2088, uLng = 106.8456, mapObj = null;

// ===== MAP =====
function initMap(lat, lng) {
    document.getElementById('map-loading').style.display = 'none';
    const m = document.getElementById('the-map');
    m.style.display = 'block';
    if (mapObj) return;

    mapObj = L.map('the-map', { center:[lat,lng], zoom:13, zoomControl:false, attributionControl:false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(mapObj);

    // User marker
    const uIco = L.divIcon({
        className:'',
        html:`<div style="width:16px;height:16px;background:#16A34A;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>`,
        iconSize:[16,16], iconAnchor:[8,8]
    });
    L.marker([lat,lng],{icon:uIco}).addTo(mapObj).bindPopup('<b>📍 Lokasi Anda</b>');

    // TPS markers
    tpsList.forEach(t => {
        const c = t.status==='penuh'?'#DC2626':t.status==='diproses'?'#3B82F6':'#16A34A';
        const ico = L.divIcon({
            className:'',
            html:`<svg xmlns='http://www.w3.org/2000/svg' width='26' height='34' viewBox='0 0 26 34'>
                <path d='M13 0C5.82 0 0 5.82 0 13c0 9.75 13 21 13 21S26 22.75 26 13C26 5.82 20.18 0 13 0z' fill='${c}'/>
                <circle cx='13' cy='13' r='5.5' fill='white'/>
            </svg>`,
            iconSize:[26,34], iconAnchor:[13,34]
        });
        L.marker([t.lat,t.lng],{icon:ico}).addTo(mapObj)
            .bindPopup(`<b>${t.nama}</b><br><small style="color:${c}">${t.status.toUpperCase()}</small>`);
    });

    setTimeout(() => mapObj.invalidateSize(), 150);
}

function loadMap() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            p => { uLat=p.coords.latitude; uLng=p.coords.longitude; initMap(uLat,uLng); },
            () => initMap(uLat,uLng),
            { timeout:5000 }
        );
    } else initMap(uLat,uLng);
}

function bukaGMaps() {
    window.open(`https://www.google.com/maps/search/TPS+sampah/@${uLat},${uLng},14z`,'_blank');
}

// ===== LAPORAN =====
const badgeCls = { diproses:'b-proses', selesai:'b-selesai', menunggu:'b-tunggu', darurat:'b-darurat', penuh:'b-tunggu' };
const badgeTxt = { diproses:'Diproses', selesai:'Selesai', menunggu:'Menunggu', darurat:'Darurat', penuh:'Penuh' };

function render() {
    const el = document.getElementById('lap-list');
    if (!laporans.length) {
        el.innerHTML = `<div class="empty"><div class="empty-ico">📭</div><div class="empty-txt">Belum ada laporan</div></div>`;
    } else {
        el.innerHTML = [...laporans].reverse().map((l,i) => `
            <div class="lap-card" style="animation-delay:${i*.06}s">
                <div class="lap-icon">🗑️</div>
                <div class="lap-body">
                    <div class="lap-top">
                        <div class="lap-title">${l.lokasi}</div>
                        <span class="badge ${badgeCls[l.status]||''}">${badgeTxt[l.status]||l.status}</span>
                    </div>
                    <div class="lap-meta">${l.alamat} · ${l.waktu}</div>
                </div>
            </div>`).join('');
    }
    document.getElementById('cnt-full').textContent = laporans.filter(l=>['penuh','menunggu','darurat'].includes(l.status)).length;
    document.getElementById('cnt-proses').textContent = laporans.filter(l=>l.status==='diproses').length;
}

// ===== MODAL =====
function openModal() {
    document.getElementById('overlay').classList.add('on');
    document.body.style.overflow = 'hidden';
}
function closeModal() {
    document.getElementById('overlay').classList.remove('on');
    document.body.style.overflow = '';
}
function closeModalOut(e) { if(e.target===document.getElementById('overlay')) closeModal(); }

function kirim() {
    const lok = document.getElementById('f-lokasi').value.trim();
    const alm = document.getElementById('f-alamat').value.trim();
    const sts = document.getElementById('f-status').value;
    const ket = document.getElementById('f-ket').value.trim();
    if (!lok) { toast('⚠️ Mohon isi nama lokasi TPS'); return; }
    laporans.push({ id:Date.now(), lokasi:lok, alamat:alm||ket||'Tanpa keterangan', waktu:'Baru saja', status:sts });
    render();
    closeModal();
    ['f-lokasi','f-alamat','f-ket'].forEach(id => document.getElementById(id).value='');
    document.getElementById('f-status').value='penuh';
    toast('✅ Laporan berhasil dikirim!');
}

// ===== TOAST =====
let tTimer;
function toast(msg) {
    const el = document.getElementById('toastEl');
    el.textContent = msg;
    el.classList.add('on');
    clearTimeout(tTimer);
    tTimer = setTimeout(()=>el.classList.remove('on'), 3000);
}

// ===== INFO =====
function showInfo(t) {
    const m = {
        nearby: `📍 ${document.getElementById('cnt-near').textContent} TPS dalam radius 2km`,
        full:   `🗑️ ${document.getElementById('cnt-full').textContent} TPS penuh, perlu penanganan`,
        proses: `♻️ ${document.getElementById('cnt-proses').textContent} laporan sedang diproses`,
    };
    toast(m[t]||'');
}

document.getElementById('notif-btn').onclick = () => toast('🔔 Tidak ada notifikasi baru');

// ===== INIT =====
render();
loadMap();
</script>
